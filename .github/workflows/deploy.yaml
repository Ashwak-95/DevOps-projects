name: CI/CD pipeline to build and deploy apps

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Build and Push Image
      run: |
        IMAGE=${{ secrets.DOCKER_USERNAME }}/k3s-app:${{ github.sha }}
        
        echo "Deploying image: $IMAGE"

        docker build -t $IMAGE .
        docker push $IMAGE

    - name: Deploy to k3s
      run: |
        IMAGE=${{ secrets.DOCKER_USERNAME }}/k3s-app:${{ github.sha }}

        kubectl apply -f k8s/

        kubectl set image deployment/k3s-app k3s-app=$IMAGE

        kubectl annotate deployment/k3s-app \
          kubernetes.io/change-cause="${{ github.event.head_commit.message }}" \
          --overwrite

        kubectl rollout status deployment/k3s-app --timeout=60s